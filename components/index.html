<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Web Components | dots and lines Case Study</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="../css/main.css"/>
    
  </head>
  <body>
    <h1 class="page__heading">Web Components</h1>

    <h2>Typography Default</h2>
    <article class="components">
        <h3 class="components__name">body</h3>
        <div class="components__img">
            <img src="img/copy_body.png" alt="copy body"/>
        </div>
        <div class="components__code">
        <p>Markenkommunikation<br>
        Markenkampagnen<br>
        Employer Branding<br>
        Markenerlebnisse im Raum<br>
        Brand Engagement</p>
    </div>
    </article>

    <article class="components">
        <h3 class="components__name">heading (h1, h2, h3...)</h3>
        <div class="components__img">
            <img srcset="img/head1.png 2x" src="img/head1.png" alt="Heading 1"/>
            <img srcset="img/head4.png 2x" src="img/head2.png" alt="Heading 2"/>
            <img srcset="img/head3.png 2x" src="img/head3.png" alt="Heading 3"/>
            <img srcset="img/head2.png 2x" src="img/head4.png" alt="Heading 4"/>
        </div>
        <div class="components__code">
            <h1>and solutions</h1>
            <h2>Was wir machen</h2>
            <h3>List Holding</h3>
            <h4>Worauf wir stolz sind</h4>
    </div>
    </article>

    <article class="navbar">
        <h3 class="components__name">Nav Bar</h3>
        <div class="components__img">
        <img srcset="img/main-nav.png 2x" src="img/main_nav.png" alt="Nav Bar"/>
        </div>
        <div class="components__code">
        <div class="main-nav">
        <nav class="main-nav__container">
            <div class="main-nav__logo">
                <span>dots</span><br>
                <span>and</span><br>
                <span>lines</span>
            </div>
            <div class="main-nav__menu">
            <a href="#">contact</a>
            <a href="#">menu</a>
            </div>
        </nav>
        </div>
        </div>
    </article>
  </body>
</html>
